<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asistan — Giriş</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm space-y-6 px-4">
    <div class="text-center space-y-2">
      <div class="text-5xl">🎙️</div>
      <h1 class="text-2xl font-bold text-slate-100">Asistan</h1>
      <p class="text-slate-400 text-sm">Email & Podcast Özet</p>
    </div>

    <form method="POST" action="/login" class="space-y-4">
      <div>
        <input
          type="password"
          name="password"
          placeholder="Şifre"
          autofocus
          class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 outline-none focus:border-indigo-500 transition"
        >
      </div>
      {% if error %}
      <p class="text-red-400 text-sm text-center">Yanlış şifre.</p>
      {% endif %}
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-lg transition">
        Giriş Yap
      </button>
    </form>
  </div>
</body>
</html>
